<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Alke Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="wallet-bg">

  <main class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg border-0 wallet-card p-4" style="max-width: 420px; width: 100%;">
      <div class="text-center mb-4">
        <h1 class="fw-bold text-wallet">Alke Wallet(Prueba - Proyecto módulo 2)</h1>
        <p class="text-muted mb-0">Ingresa a tu billetera digital</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="usuario@correo.com" required>
          <div class="invalid-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="********" required>
          <div class="invalid-feedback">La contraseña es obligatoria.</div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-wallet">Iniciar sesión</button>
        </div>
      </form>

      <div id="loginMessage" class="mt-3 text-center small"></div>

      <div class="mt-4 p-3 rounded bg-light border">
        <p class="mb-1 fw-semibold">Credenciales de prueba</p>
        <p class="mb-1 small">Correo: <span class="text-wallet">gustavov@alkewallet.com</span></p>
        <p class="mb-0 small">Contraseña: <span class="text-wallet">123456</span></p>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
