<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar dinero | Alke Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="wallet-bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark wallet-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navWallet">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navWallet">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósito</a></li>
          <li class="nav-item"><a class="nav-link active" href="sendmoney.html">Enviar dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h1 class="fw-bold mb-3">Enviar dinero</h1>
            <p class="text-muted">Saldo disponible: <span class="fw-semibold text-wallet" id="sendCurrentBalance">$0</span></p>

            <form id="sendMoneyForm" novalidate>
              <div class="mb-3">
                <label for="contactSearch" class="form-label">Buscar contacto</label>
                <input type="text" class="form-control" id="contactSearch" placeholder="Escribe un nombre..." list="contactList" required>
                <datalist id="contactList"></datalist>
                <div class="invalid-feedback">Selecciona o escribe un contacto.</div>
              </div>

              <div class="mb-3">
                <label for="sendAmount" class="form-label">Monto a transferir</label>
                <input type="number" class="form-control" id="sendAmount" min="1" placeholder="Ej: 10000" required>
                <div class="invalid-feedback">Ingresa un monto válido.</div>
              </div>

              <div class="d-grid">
                <!-- Botón que abre el modal -->
                 <div class="d-grid">
                <button type="button" class="btn btn-wallet" id="btnOpenTransferModal">Transferir</button>
              </div>
            </form>

            <div id="sendMessage" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body p-4">
            <h4 class="mb-3">Agregar nuevo contacto</h4>
            <form id="addContactForm" novalidate>
              <div class="mb-3">
                <label for="newContact" class="form-label">Nombre del contacto</label>
                <input type="text" class="form-control" id="newContact" placeholder="Ej: María González" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-outline-wallet">Agregar contacto</button>
              </div>
            </form>
            <div id="contactMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h4 class="mb-3">Lista de contactos</h4>
            <ul class="list-group" id="contactsContainer"></ul>
          </div>
        </div>
      </div>
    </div>
    <!-- Modal de confirmación Bootstrap -->
<div class="modal fade" id="confirmTransferModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalLabel">Confirmar transferencia</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body" id="modalTransferDetail">
        ¿Confirmas la transferencia?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-wallet" id="btnConfirmTransfer">Confirmar</button>
      </div>
    </div>
  </div>
</div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
